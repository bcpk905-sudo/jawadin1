<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الإدارية - متوسطة الجوادين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 20px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 6px; }
        .student-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. إدارة التبليغات العامة</h2>
    <textarea id="genNotif" placeholder="نص التبليغ العام..."></textarea>
    <button onclick="publishGeneral()">نشر التبليغ العام</button>
</div>

<div class="card">
    <h2>2. قاعدة بيانات الطلاب</h2>
    <select id="selectGrade" onchange="loadStudents()">
        <option value="">اختر الصف</option>
        <option value="1">الأول المتوسط</option>
        <option value="2">الثاني المتوسط</option>
        <option value="3">الثالث المتوسط</option>
    </select>
    <div id="studentsList"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jawadin-school1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function publishGeneral() {
        const text = document.getElementById('genNotif').value;
        const pass = prompt("أدخل الرمز السري:");
        if(pass !== "jawadin_secret_2026") return alert("خطأ!");
        db.ref('notifications').push({ text: text, date: new Date().toLocaleDateString() });
        alert("تم النشر!");
    }

    function loadStudents() {
        const grade = document.getElementById('selectGrade').value;
        if(!grade) return;
        const list = document.getElementById('studentsList');
        list.innerHTML = "جاري التحميل...";
        
        db.ref('students').orderByChild('grade').equalTo(grade).on('value', snap => {
            const students = snap.val();
            list.innerHTML = "";
            for(let id in students) {
                list.innerHTML += `<div class="student-item">
                    <span>${students[id].name} - ${students[id].class}</span>
                    <button onclick="editStudent('${id}')">إدارة درجاته</button>
                </div>`;
            }
        });
    }

    function editStudent(id) {
        // هنا ستفتح واجهة إدخال الدرجات والتبليغ الخاص
        alert("جارِ فتح واجهة إدارة الطالب: " + id);
    }
</script>
</body>
</html>
