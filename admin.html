<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة إدارة متوسطة الجوادين للبنين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { border: 2px solid #e2e8f0; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #2563eb; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { padding: 8px 16px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; }
        .tab-btn.active { background: #2563eb; color: white; border: none; }
        .student-item { padding: 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">لوحة إدارة متوسطة الجوادين للبنين</h2>
    
    <!-- الخيارات الرئيسية -->
    <div class="card-group">
        <div class="card" id="cardStudents" onclick="showSection('students')"><h3>قاعدة بيانات طلاب الجوادين</h3></div>
        <div class="card" id="cardAnnounce" onclick="showSection('announce')"><h3>التبليغات والتعميم الإداري</h3></div>
    </div>

    <!-- قسم إدارة الطلاب -->
    <div id="sectionStudents" style="display:none;">
        <div class="tabs" id="gradeTabs">
            <button class="tab-btn" onclick="setGrade('1')">الأول متوسط</button>
            <button class="tab-btn" onclick="setGrade('2')">الثاني متوسط</button>
            <button class="tab-btn" onclick="setGrade('3')">الثالث متوسط</button>
        </div>
        <div id="classTabs" class="tabs"></div>
        <div id="studentsList">الرجاء اختيار الصف والشعبة لعرض الطلاب</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const db = firebase.database();
    let currentGrade = '', currentClass = '';

    function setGrade(g) {
        currentGrade = g;
        const classTabs = document.getElementById('classTabs');
        classTabs.innerHTML = '';
        const classes = g === '3' ? ['أ','ب','ج','د','هـ'] : ['أ','ب','ج','د'];
        classes.forEach(c => {
            classTabs.innerHTML += `<button class="tab-btn" onclick="setClass('${c}')">شعبة ${c}</button>`;
        });
    }

    function setClass(c) {
        currentClass = c;
        // جلب الطلاب من Firebase بناءً على الصف والشعبة المحددة
        db.ref('students').orderByChild('grade').equalTo(currentGrade).on('value', snap => {
            const list = document.getElementById('studentsList');
            list.innerHTML = '<h4>الطلاب المسجلون:</h4>';
            let found = false;
            snap.forEach(s => {
                if (s.val().classOption === c) {
                    list.innerHTML += `<div class="student-item" onclick="openStudent('${s.key}')">${s.val().fullName}</div>`;
                    found = true;
                }
            });
            if(!found) list.innerHTML += 'لا يوجد طلاب مسجلون في هذه الشعبة.';
        });
    }

    function showSection(s) {
        document.getElementById('sectionStudents').style.display = s === 'students' ? 'block' : 'none';
        // إضافة كود التبليغات هنا مستقبلاً
    }
</script>
</body>
</html>
