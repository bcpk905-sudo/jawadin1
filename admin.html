<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | متوسطة الجوادين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #1e293b; text-align: center; }
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.3s; }
        select:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        .section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 لوحة تحكم الأستاذ</h2>
    
    <div class="section">
        <label>إرسال تبليغ عام:</label>
        <textarea id="genNotif" rows="3" placeholder="اكتب هنا..."></textarea>
        <button onclick="publishGeneralNotif()">نشر التبليغ</button>
    </div>

    <div class="section">
        <label>اختيار الصف:</label>
        <select id="selectGrade" onchange="updateClasses()">
            <option value="">حدد الصف...</option>
            <option value="1">الأول المتوسط</option>
            <option value="2">الثاني المتوسط</option>
            <option value="3">الثالث المتوسط</option>
        </select>

        <label>اختيار الشعبة:</label>
        <select id="selectClass">
            <option value="">اختر الصف أولاً</option>
        </select>
    </div>
</div>

<script>
    function updateClasses() {
        const grade = document.getElementById('selectGrade').value;
        const classSelect = document.getElementById('selectClass');
        classSelect.innerHTML = '<option value="">اختر الشعبة...</option>';
        
        let sections = [];
        if (grade === "1" || grade === "2") sections = ['أ', 'ب', 'ج', 'د', 'و'];
        if (grade === "3") sections = ['أ', 'ب', 'ج', 'د', 'هـ'];

        sections.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s;
            opt.innerHTML = 'شعبة ' + s;
            classSelect.appendChild(opt);
        });
    }
</script>
</body>
</html>
