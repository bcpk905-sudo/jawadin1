<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الأستاذ - متوسطة الجوادين</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f3f4f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        select, input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2>تسجيل دخول الأستاذ</h2>
    <input type="password" id="adminPass" placeholder="أدخل رمز الدخول السري">
    <button onclick="checkAdmin()">دخول</button>
</div>

<div class="card" id="adminPanel" style="display:none;">
    <h2>لوحة تحكم الأستاذ</h2>
    <hr>
    <h3>1. التبليغات العامة</h3>
    <textarea id="genNotif" placeholder="اكتب التبليغ العام هنا..."></textarea>
    <button onclick="publishGeneralNotif()">نشر التبليغ العام</button>

    <hr>
    <h3>2. قاعدة بيانات الطلاب</h3>
    <select id="selectGrade" onchange="loadClasses()">
        <option value="">اختر الصف</option>
        <option value="1">الأول المتوسط</option>
        <option value="2">الثاني المتوسط</option>
        <option value="3">الثالث المتوسط</option>
    </select>
    <select id="selectClass" onchange="loadStudents()"></select>
    
    <div id="studentList"></div>
    <div id="studentDetailArea" style="display:none; margin-top:20px; border:1px solid #ccc; padding:15px;">
        <h3 id="studentName"></h3>
        <input type="text" id="gradeInput" placeholder="أدخل الدرجة أو 'لم تعلن بعد'">
        <textarea id="privateNote" placeholder="تبليغ خاص للطالب (اختياري)"></textarea>
        <button onclick="saveStudentData()">حفظ البيانات</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jawadin-school1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkAdmin() {
        if(document.getElementById('adminPass').value === "123456") { // يمكنك تغيير الرمز
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else { alert("رمز خاطئ!"); }
    }

    // هنا سنضيف لاحقاً دوال جلب الطلاب وحفظ الدرجات
</script>
</body>
</html>
