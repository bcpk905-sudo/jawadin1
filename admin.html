<div id="adminLogin">
    <input type="password" id="adminPass" placeholder="أدخل رمز الدخول">
    <button onclick="checkAdmin()">دخول</button>
</div>

<div id="adminDashboard" style="display:none;">
    <button onclick="showStudentsList()">قاعدة بيانات الطلاب</button>
    <button onclick="showAdminAnnouncements()">التعميمات والتبليغات</button>

    <div id="gradesNav">
        <button onclick="filterByGrade('1')">الأول متوسط</button>
        <button onclick="filterByGrade('2')">الثاني متوسط</button>
        <button onclick="filterByGrade('3')">الثالث متوسط</button>
    </div>

    <div id="studentsContainer"></div>
</div>

<script>
    // 1. الدخول
    function checkAdmin() {
        if(document.getElementById('adminPass').value === "1234") { // استبدل 1234 بكلمة مرورك
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
        } else { alert("كلمة المرور خطأ!"); }
    }

    // 2. جلب الطلاب حسب الصف والشعبة
    function filterByGrade(grade) {
        database.ref('students').orderByChild('grade').equalTo(grade).on('value', (snapshot) => {
            const students = snapshot.val();
            let html = '';
            for(let id in students) {
                html += `<div onclick="editStudent('${id}')">اسم الطالب: ${students[id].fullName}</div>`;
            }
            document.getElementById('studentsContainer').innerHTML = html;
        });
    }

    // 3. تعديل بيانات الطالب ودرجاته
    function editStudent(studentId) {
        database.ref('students/' + studentId).once('value').then(snap => {
            const student = snap.val();
            // هنا يظهر نموذج (Modal) يحتوي على خانات الدرجات لكل المواد
            // مثال لإضافة تبليغ خاص للطالب:
            let msg = prompt("أدخل تبليغ خاص لهذا الطالب:");
            if(msg) {
                database.ref('students/' + studentId + '/notifications').push(msg);
            }
        });
    }
</script>
