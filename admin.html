<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة - مدرسة الجوادين</title>
    <!-- تم الإبقاء على نفس تصميمك الأصلي -->
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { background: #2563eb; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        #adminDashboard { display: none; }
    </style>
</head>
<body>

<div id="loginCard" class="card">
    <h2 style="text-align: center;">دخول الإدارة</h2>
    <input type="password" id="adminPassword" placeholder="أدخل كلمة المرور">
    <button onclick="tryLogin()">دخول</button>
</div>

<div id="adminDashboard" class="card">
    <h2 style="text-align: center;">لوحة تحكم إدارة الطلاب</h2>
    <div id="studentsList">
        <!-- هنا ستظهر قائمة الطلاب -->
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    // ضع بيانات Firebase الخاصة بك هنا
    const firebaseConfig = { 
        /* بياناتك هنا */
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function tryLogin() {
        const passwordInput = document.getElementById('adminPassword').value;
        if (passwordInput === "123456") { 
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadStudents();
        } else {
            alert("كلمة المرور غير صحيحة!");
        }
    }

    function loadStudents() {
        database.ref('students').once('value', snapshot => {
            const data = snapshot.val();
            let html = '<h3>قائمة الطلاب</h3><ul>';
            for (let id in data) {
                html += `<li>${data[id].name} - 
                    <input type="text" id="notif_${id}" placeholder="تبليغ خاص للطالب">
                    <button onclick="sendPrivateNotification('${id}')">إرسال</button></li>`;
            }
            document.getElementById('studentsList').innerHTML = html + '</ul>';
        });
    }

    function sendPrivateNotification(studentId) {
        const text = document.getElementById('notif_' + studentId).value;
        if (!text) return alert("الرجاء كتابة التبليغ");
        database.ref(`students/${studentId}/private_notification`).set(text)
        .then(() => alert("تم إرسال التبليغ بنجاح!"));
    }
</script>
</body>
</html>
