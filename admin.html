<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الإدارية | متوسطة الجوادين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; }</style>
</head>
<body class="p-4 md:p-10">

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl text-center">
        <img src="logo.png" class="w-24 mx-auto mb-6"> <!-- ضع رابط شعار المدرسة هنا -->
        <h2 class="text-2xl font-bold mb-6 text-gray-800">دخول الإدارة</h2>
        <input type="password" id="pass" class="w-full p-4 border rounded-2xl mb-4" placeholder="الرمز السري">
        <button onclick="checkPass()" class="w-full bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-700 transition">دخول</button>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard" class="hidden max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-gray-800">لوحة تحكم متوسطة الجوادين</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- كارت التبليغات -->
            <div class="bg-white p-6 rounded-3xl shadow-lg border-r-8 border-blue-500">
                <h2 class="text-xl font-bold mb-4">📢 التبليغات والتعميمات</h2>
                <button class="w-full bg-blue-50 text-blue-600 p-4 rounded-xl font-bold">إدارة المنشورات العامة</button>
            </div>

            <!-- كارت قاعدة البيانات -->
            <div class="bg-white p-6 rounded-3xl shadow-lg border-r-8 border-emerald-500">
                <h2 class="text-xl font-bold mb-4">🗂️ قاعدة بيانات الطلاب</h2>
                <div class="space-y-2">
                    <button onclick="showGrades()" class="w-full bg-emerald-50 text-emerald-600 p-4 rounded-xl font-bold">عرض الطلاب حسب الصف</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === "1234") { // رمزك السري
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert("رمز خاطئ!"); }
        }

        // سأقوم برمجياً بإنشاء القوائم الديناميكية هنا لاحقاً
    </script>
</body>
</html>
